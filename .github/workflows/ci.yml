name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  copyright-gate:
    name: Copyright gate + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r pipeline/requirements.txt
          pip install pytest
      - name: Copyright gate (validate corpus)
        run: python pipeline/validate.py
      - name: Run test suite
        run: python -m pytest pipeline/tests -q
      - name: Wikidata death-date cross-check (warn-only)
        continue-on-error: true
        run: python pipeline/wikidata_check.py

  build-site:
    name: Build site
    runs-on: ubuntu-latest
    needs: copyright-gate
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Tectonic (for PDF compilation)
        uses: wtfjoke/setup-tectonic@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Compile PDFs (deploy-time, not committed)
        run: |
          pip install -r pipeline/requirements.txt
          python pipeline/build_pdfs.py --out site/public/pdf
      - name: Build site data (only PD works, min status)
        run: python pipeline/build_site_data.py --out site/src/data/works.json
      - name: Build Astro site
        working-directory: site
        run: |
          npm install
          npm run build
      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: site/dist
      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: readthemasters
          directory: site/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
