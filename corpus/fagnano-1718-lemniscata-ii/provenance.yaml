  reviewers:
    - name: DvdL
      level: skimmed
      date: "2026-07-22"
      note: "Skimmed the math against the original scan — it agrees."
  note: >-
    Complete memoir, printed pages 304–313 (= scan djvu pages 334–343). Transcribed from the
    Wikimedia Commons scan, with zoomed crops used to confirm every equation, theorem heading,
    and cross-reference. Two printer's inconsistencies were confirmed against the scan (zoomed
    to pixel level) and reproduced faithfully rather than silently corrected: (a) the theorem
    heading on p. 308 reads "Teorema IV" a second time, where every later in-text cross-reference
    in this same memoir (pp. 309, 310) calls it "il teorema VI" — almost certainly a repeat of
    the earlier p. 305 heading rather than the intended "VI"; (b) the p. 305 "Teorema IV" heading
    itself cites "equazioni (6), e (8)" where it should read "(7), e (8)" by the pattern of every
    other theorem in the text (eq. (6) belongs to the preceding Teorema III, not this one). A
    third likely misprint was left as printed without the same pixel-level re-verification: the
    "Terzo" remark in Scolio I (p. 306) writes $\int dz/\sqrt{1+x^4}$, mixing the differential
    $dz$ with variable $x$; its consequence in the "Sesto" remark uses $dx$ throughout, so "dz" is
    probably a compositor's slip for "dx". All three are noted in the file header of
    original.tex for a reviewer. Fig. 32, printed on the same plate (Tav. III) as figs. 29, 30,
    31, 33, is not cited by number anywhere in this memoir's text and was therefore not
    reproduced.
  verification:
    flagged_pages: [305, 306, 308]
    date: "2026-07-22"

